apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: streamingapp

spec:
  replicas: 1

  selector:
    matchLabels:
      app: frontend

  template:
    metadata:
      labels:
        app: frontend

    spec:
      containers:
      - name: frontend

        image: 672120083021.dkr.ecr.ap-south-1.amazonaws.com/streamingapp-frontend:latest

        imagePullPolicy: Always

        ports:
        - containerPort: 80