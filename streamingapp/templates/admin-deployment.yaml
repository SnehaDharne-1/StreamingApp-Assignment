apiVersion: apps/v1
kind: Deployment

metadata:
  name: admin
  namespace: streamingapp

spec:
  replicas: 1

  selector:
    matchLabels:
      app: admin

  template:
    metadata:
      labels:
        app: admin

    spec:
      containers:
        - name: admin
          image: 672120083021.dkr.ecr.ap-south-1.amazonaws.com/streamingapp-admin:latest
          imagePullPolicy: Always

          ports:
            - containerPort: 3003

          env:
            - name: MONGO_URI
              value: mongodb://mongo:27017/streamingapp