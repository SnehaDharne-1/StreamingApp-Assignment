apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth
  namespace: streamingapp

spec:
  replicas: 1

  selector:
    matchLabels:
      app: auth

  template:
    metadata:
      labels:
        app: auth

    spec:
      containers:
      - name: auth

        image: 672120083021.dkr.ecr.ap-south-1.amazonaws.com/streamingapp-auth:latest

        imagePullPolicy: Always

        ports:
        - containerPort: 3001

        env:
            - name: MONGO_URI
              value: mongodb://mongo:27017/streamingapp